# ============================================================
# Nginx Reverse Proxy for n8n
# Use this if self-hosting on a VPS (Ubuntu/Debian)
#
# Setup:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
#   sudo cp nginx.conf /etc/nginx/sites-available/n8n
#   sudo ln -s /etc/nginx/sites-available/n8n /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Allow large file uploads (for workflow imports)
    client_max_body_size 16m;

    # Proxy to n8n
    location / {
        proxy_pass          http://localhost:5678;
        proxy_http_version  1.1;

        # WebSocket support (required for n8n editor)
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";

        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # Timeouts — n8n workflows can run for several minutes
        proxy_read_timeout  300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout  300s;
    }
}
